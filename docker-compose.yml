services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dunkie
      POSTGRES_PASSWORD: dunkie_password
      POSTGRES_DB: dunkie
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dunkie -d dunkie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
